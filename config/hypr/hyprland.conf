monitor=,preferred,auto,1.33


$mainMod = SUPER
$terminal = ghostty
$fileManager = thunar
$menu = ~/.config/hypr/scripts/hub-menu.sh

exec-once = hyprlock
exec-once = hypridle
exec-once = /usr/bin/elephant
exec-once = ~/.config/hypr/scripts/launch-waybar.sh
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = swaync
exec-once = hyprpaper
exec-once = udiskie
exec-once = swayosd-server

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, W, killactive
bind = $mainMod, M, exec, hyprctl dispatch exit
bind = $mainMod, V, exec, ~/.config/hypr/scripts/clipboard-menu.sh

# Move focus with SUPER + arrow keys
bind = $mainMod, LEFT, movefocus, l
bind = $mainMod, RIGHT, movefocus, r
bind = $mainMod, UP, movefocus, u
bind = $mainMod, DOWN, movefocus, d

# Swap windows with SUPER + SHIFT + arrow keys
bind = $mainMod SHIFT, LEFT, swapwindow, l
bind = $mainMod SHIFT, RIGHT, swapwindow, r
bind = $mainMod SHIFT, UP, swapwindow, u
bind = $mainMod SHIFT, DOWN, swapwindow, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Move windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Cycle workspaces
bind = $mainMod, TAB, workspace, e+1
bind = $mainMod SHIFT, TAB, workspace, e-1

# Fullscreen and floating
bind = $mainMod, F, fullscreen
bind = $mainMod, T, togglefloating

# Resize with SUPER + CTRL + arrows
bind = $mainMod CTRL, LEFT, resizeactive, -50 0
bind = $mainMod CTRL, RIGHT, resizeactive, 50 0
bind = $mainMod CTRL, UP, resizeactive, 0 -50
bind = $mainMod CTRL, DOWN, resizeactive, 0 50


# Lock  
bind = $mainMod, L, exec, hyprlock

# Screenshot selection
bind = , F6, exec, grim -g "$(slurp)" - | swappy -f -
bind = SUPER, F6, exec, grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png | wl-copy


# === Fn Keys ===

# Volume (with OSD)
bind = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bind = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle

# Brightness (with OSD)
bind = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Profile toggle (Fn+F5)
bind = , XF86Launch4, exec, asusctl profile next

# Touchpad toggle
bind = , XF86TouchpadToggle, exec, ~/.config/hypr/scripts/touchpad_toggle.sh

# Sleep
bind = , XF86Sleep, exec, systemctl suspend

# Armoury Crate key repurposed - change to whatever you want
bind = , XF86Launch3, exec, walker

# ========================
# LOOK & FEEL
# ========================

general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    layout = dwindle
}

source = ~/.config/hypr/colors.conf

decoration {
    rounding = 8

    blur {
        enabled = true
        size = 8
        passes = 3
        noise = 0.02
        new_optimizations = true
        xray = false
    }
}

animations {
    enabled = true

    bezier = ease, 0.25, 0.1, 0.25, 1.0
    bezier = menuEase, 0.16, 1, 0.3, 1

    animation = windows, 1, 5, ease
    animation = fade, 1, 5, ease
    animation = workspaces, 1, 5, ease
    animation = layers, 1, 3, menuEase, fade
}

input {
    kb_layout = gb
}


# ========================
# LAYER RULES
# ========================

# Frosted glass blur — add new namespaces to the regex below
layerrule = blur on, match:namespace ^(walker|swayosd|notifications|control-center)$
layerrule = ignore_alpha 0.3, match:namespace ^(walker|swayosd|notifications|control-center)$
layerrule = animation fade, match:namespace ^(walker)$

# ========================
# WINDOW RULES
# ========================

# Float common dialogs
windowrule = float on, match:title ^(Open File|Save File|Choose File|File Operation Progress)$
windowrule = float on, match:title ^(Confirm|Confirmation|Warning|Error)$

# Float Thunar progress windows
windowrule = float on, match:class ^(thunar)$, match:title ^(File Operation Progress)$

# Center all floating windows
windowrule = center on, match:float 1

# Float some utility apps
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(swappy)$

# Float the WiFi/Bluetooth/Hotspot TUIs (impala / bluetui) launched by the
# control centre. 'hotspot' is impala in --mode ap under a distinct app-id.
# 'update' is the sharkos-update terminal launched from the hub menu.
windowrule = float on, match:class ^(com\.sharkos\.(impala|bluetui|hotspot|update))$
windowrule = size 875 600, match:class ^(com\.sharkos\.(impala|bluetui|hotspot|update))$

# Dark mode signal to apps
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'

