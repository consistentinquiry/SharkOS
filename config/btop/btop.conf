# sharkOS btop config. The "sharkos" theme is generated by apply-theme.sh from
# the active sharkOS theme, so btop tracks whatever theme is selected.
color_theme = "sharkos"

# Use the terminal background (transparent) rather than the theme's main_bg, so
# btop inherits ghostty's frosted-glass translucency like the rest of the UI.
theme_background = False

truecolor = True
vim_keys = True
rounded_corners = True
